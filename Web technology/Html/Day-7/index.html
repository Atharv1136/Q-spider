<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Checkbox Button</h1>
    <form action="">
        <label for="marathi">Marathi</label>
        <input type="checkbox" id="Marathi">
        <br><br>
        <label for="English">English</label>
        <input type="checkbox" id="English">
        <br><br>
        <label for="Hindi">Hindi</label>
        <input type="checkbox" id="Hindi">
        <br><br>
    </form>

    <br><br>
    <h1>Radio Button</h1>
    <form action="">
        <label for="marathi">Marathi</label>
        <input type="radio" id="MarathiR" name="Mothertongue">
        <br><br>
        <label for="English">English</label>
        <input type="radio" id="EnglishR" name="Mothertongue">
        <br><br>
        <label for="Hindi">Hindi</label>
        <input type="radio" id="HindiR" name="Mothertongue">
        <br><br>
    </form>
    <br><br>
    <h1>Drop down</h1>
    <select name="" id="">
        <option value="">Select Language</option>
        <option value="">Marathi</option>
        <option value="">Hindi</option>
        <option value="">English</option>
    </select>
    <br><br>
    <button>Submit</button>
</body>

</html>
