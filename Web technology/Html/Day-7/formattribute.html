<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
</head>
<form action="">
    <h1>Placeholder</h1>
    <input type="text" placeholder="Username">
    <h1>Min lenght <h2>Allow if minumum Number Criteria Satisfy</h2>
    </h1>
    <input type="text" minlength="3">
    <h1> Max lenght <h2>Allowed maximum number only</h2>
    </h1>
    <input type="text" maxlength="4">
    <h1>Access Key Shortcut to the box </h1>
    <input type="text" accesskey="a" placeholder="Use alt + a">

    <h1>Autofocus Used to fous one</h1>
    <input type="text" autofocus>

    <input type="text" disabled>
    <input type="text" readonly>
    <input type="text" draggable="true">
    <input type="text" required> <span style="color: brown;">*</span>
    <input type="checkbox" disabled checked>
    <button>click</button>



</form>

</html>
