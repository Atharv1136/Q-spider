<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        aside {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        aside::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
    </style>
</head>

<body class="bg-black text-white">
    <main class="flex items-start mt-[7vh] mb-[80px] ml-[22%] h-[calc(100vh-7vh-80px)] overflow-hidden">
        <aside
            class="fixed top-[7vh] left-0 bottom-[80px] w-[22%] rounded-[20px] bg-[#121212] overflow-y-auto p-2 box-border">
            <div class="h-[84vh] w-[100%] flex flex-col justify-around">
                <div class="h-[10%] rounded-[20px] flex justify-between items-center">
                    <section class="pl-2 font-bold text-white">Your Library</section>
                    <section class="pr-2 font-bold w-[2x] bg-[#1F1F1F] rounded-[20px] text-white"><i
                            class="fa-solid fa-plus "></i>
                        Create
                    </section>
                </div>
                <div class="h-[40%] w-[100%]">
                    <section class="w-[100%] h-[50%] bg-[#1F1F1F] rounded-[20px] ">
                        <p class="font-bold text-white pt-2 pl-3 text-xl">Create your first playlist</p>
                        <p class="text-white pt-2 pl-3">It's easy, we'll help you</p>
                        <br>
                        <div
                            class="font-bold text-black pt-2 pl-3 bg-[#FFFFFF] w-[150px] rounded-[50px] flex items-center pb-2 pl-2">
                            Create playlist
                        </div>
                    </section>
                    <br>
                    <section class="w-[100%] h-[50%] bg-[#1F1F1F] rounded-[20px] ">
                        <p class="font-bold text-white pt-2 pl-3 text-xl">Let's find some podcasts to follow</p>
                        <p class="text-white pt-2 pl-3">We'll keep you updated on new episodes</p>
                        <br>
                        <div
                            class="font-bold text-black pt-2 pl-3 bg-[#FFFFFF] w-[150px] rounded-[50px] flex items-center pb-2 pl-2">
                            Browse podcasts
                        </div>
                    </section>
                </div>
                <div class="h-[40%] w- text-white flex justify-end items-end">
                    <section class="flex justify-around flex-wrap gap-[10px] text-gray-300">
                        <a href="#">Legal</a>
                        <a href="#">Safety & Privacy Center</a>
                        <a href="#">About</a>
                        <a href="#">Ads</a>
                        <a href="#">Accessibility</a>
                        <a href="#">Privacy Policy</a>
                        <a href="#">cookie</a>
                    </section>
                </div>
            </div>
        </aside>

        <section
            class=" flex gap-[200px] content w-full rounded-[20px] min-h-screen bg-[radial-gradient(circle_at_top,_rgba(8,40,38,0.9)_0%,_rgba(8,28,27,0.75)_18%,_#121212_55%,_#121212_100%)] overflow-y-auto h-full p-4 box-border">
            <div class="w-[300px] h-[300px] border border-red-400 "><img src="./assets/wajleki bar.jpg" alt=""></div>
            <div class="font-extrabold text-shadow-white p-5"> Wajle Ki Bara - Natarang</div>

        </section>
    </main>
    <footer
        class="fixed bottom-0 left-0 right-0 flex items-center justify-between h-20 px-4 bg-gradient-to-r from-fuchsia-700 via-purple-500 to-indigo-400">
        <audio controls autoplay class="w-[1400px] pl-[500px]"
            src="./assets/Wajle Ki Bara _ Natarang _ Amruta Khanvilkar _ Ajay-Atul _ Bela Shende _ Lavani Songs [7R7QJkznJGU].mp3"></audio>

        <a href="./index.html" class="text-white text-2xl ml-4">
            <i class="fa-solid fa-x"></i>
        </a>
    </footer>
</body>

</html>
